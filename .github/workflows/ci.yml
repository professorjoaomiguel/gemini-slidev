name: CI - Quality & Integrity
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run Lint
        run: npm run lint
      - name: Run Tests
        run: npx vitest run tests/infrastructure.test.ts tests/format.test.ts tests/component.test.ts
